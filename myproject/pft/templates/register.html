<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Personal Finance Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'pft.css' %}">
    <link rel="stylesheet" href="{% static 'toast.css' %}">
</head>
<body>
    <div class="auth-container">
        <form class="auth-form" method="POST" action="">
            {% csrf_token %}
            <h2>Sign Up</h2>

            {% if messages %}
            <script id="django-messages-data" type="application/json">[
                {% for message in messages %}{ "tags": "{{ message.tags }}", "message": "{{ message }}" }{% if not forloop.last %},{% endif %}{% endfor %}
            ]</script>
            {% endif %}
            
            <div class="name-row">
                <div class="name-field">
                    <label for="first_name">First Name</label>
                    <input type="text" id="first_name" name="first_name" required placeholder="First name" value="{{ form_data.first_name|default:'' }}">
                </div>
                <div class="name-field">
                    <label for="last_name">Last Name</label>
                    <input type="text" id="last_name" name="last_name" required placeholder="Last name" value="{{ form_data.last_name|default:'' }}">
                </div>
            </div>
            
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email" value="{{ form_data.email|default:'' }}">
            
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" required placeholder="Enter your phone number" value="{{ form_data.phone|default:'' }}">
            
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Create a password">
            
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm your password">
            
            <button type="submit">Register</button>

            <div class="auth-divider"><span>or</span></div>
            <a class="google-auth-btn" href="/accounts/google/login/">
                <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="google-icon">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                    <path fill="none" d="M0 0h48v48H0z"></path>
                </svg>
                Continue with Google
            </a>
            
            <p>Already have an account? <a href="{% url 'login' %}">Sign In</a></p>
            <p style="margin-top: 8px;"><a href="{% url 'pft' %}">&larr; Back to Home</a></p>
        </form>
    </div>
    {% load static %}
    <script src="{% static 'toast.js' %}"></script>
</body>
</html>
